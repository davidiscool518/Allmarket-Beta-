<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMarket Login</title>
    <link rel="stylesheet" href="skempohic.css">
    <link rel="stylesheet" href="https://unpkg.com/98.css"/>
    <link rel="icon" href="favicon.png">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2>Menu</h2>
            <ul>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/login.html">Login</a></li>
                <li><a href="/signup.html">Signup</a></li>
            </ul>
        </div>

        <div class="content">
            <h1 class="am-title" id="am-title">AllMarket</h1>
            <div class="login-container">
                <!-- Validation error box (98.css style) -->
                <div id="am-error-box" style="display:none; margin-bottom:8px;">
                    <div class="window" style="width:100%; max-width:320px;">
                        <div class="title-bar">
                            <div class="title-bar-text">Error</div>
                        </div>
                        <div class="window-body">
                            <p id="am-error-msg" style="margin:4px 0;"></p>
                        </div>
                    </div>
                </div>

                <form id="am-user-form" onsubmit="handleLogin(event)">
                    <input id="am-username-input" type="text" name="username" placeholder="Username">
                    <input id="am-password-input" type="password" name="password" placeholder="Password">
                    <button id="am-submit-button" type="submit">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ── 1. COOKIE CHECK ──────────────────────────────────────────────────────
        // On page load, if a login_session cookie already exists, skip to index.
        // If it does NOT exist, redirect to signup so the user can register first.
        (function checkSessionCookie() {
            const cookies = Object.fromEntries(
                document.cookie.split('; ').filter(Boolean).map(c => c.split('='))
            );
            if (cookies['login_session']) {
                // Already logged in — go home
                window.location.href = 'allmarket.html';
            }
            // No session → stay on login page (signup redirect happens from signup.html)
        })();

        // ── 2. INPUT VALIDATION ──────────────────────────────────────────────────
        function showError(msg) {
            document.getElementById('am-error-msg').textContent = msg;
            document.getElementById('am-error-box').style.display = 'block';
        }

        function clearError() {
            document.getElementById('am-error-box').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            clearError();

            const username = document.getElementById('am-username-input').value.trim();
            const password = document.getElementById('am-password-input').value;

            // Validation rules
            if (!username) {
                showError('Username cannot be empty.');
                return;
            }
            if (username.length < 3) {
                showError('Username must be at least 3 characters.');
                return;
            }
            if (!password) {
                showError('Password cannot be empty.');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            // ── NOTE: NOT SAFE — example only ───────────────────────────────────
            // Set a login_session cookie (expires in 1 day)
            const expires = new Date(Date.now() + 86400 * 1000).toUTCString();
            document.cookie = `login_session=${encodeURIComponent(username)}; expires=${expires}; path=/`;

            // Submit / redirect
            window.location.href = 'allmarket.html';
        }
    </script>
</body>
</html>
