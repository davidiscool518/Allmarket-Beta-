<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMarket Login</title>
    <link rel="stylesheet" href="skempohic.css">
    <link rel="stylesheet" href="https://unpkg.com/98.css"/>
    <link rel="icon" href="favicon.png">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2>Menu</h2>
            <ul>
                <li><a href="allmarket.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>

        <div class="content">
            <h1 class="am-title" id="am-title">AllMarket</h1>
            <div class="login-container">

                <!-- Validation error box (98.css style) -->
                <div id="am-error-box" style="display:none; margin-bottom:8px;">
                    <div class="window" style="width:100%; max-width:320px;">
                        <div class="title-bar">
                            <div class="title-bar-text">Error</div>
                        </div>
                        <div class="window-body">
                            <p id="am-error-msg" style="margin:4px 0;"></p>
                        </div>
                    </div>
                </div>

                <form id="am-user-form" onsubmit="handleLogin(event)">
                    <input id="am-username-input" type="text"     name="username" placeholder="Username">
                    <input id="am-password-input" type="password" name="password" placeholder="Password">
                    <button id="am-submit-button" type="submit">Submit</button>
                </form>
            </div>
            <hr>
        </div>
    </div>

    <script>
        // Helper: parse all cookies into a plain object
        function getCookies() {
            return Object.fromEntries(
                document.cookie.split('; ').filter(Boolean).map(c => {
                    const [k, ...v] = c.split('=');
                    return [k, decodeURIComponent(v.join('='))];
                })
            );
        }

        // ── 1. COOKIE CHECK (runs immediately on page load) ──────────────────────
        // No cookie  → no account registered yet, send to signup
        // Has cookie → already logged in, skip straight to allmarket
        (function checkSessionCookie() {
            const cookies = getCookies();
            if (!cookies['login_session']) {
                window.location.href = 'signup.html';
            } else {
                window.location.href = 'allmarket.html';
            }
        })();

        // ── 2. INPUT VALIDATION + ACCOUNT CHECK ──────────────────────────────────
        function showError(msg) {
            document.getElementById('am-error-msg').textContent = msg;
            document.getElementById('am-error-box').style.display = 'block';
        }

        function clearError() {
            document.getElementById('am-error-box').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            clearError();

            const username = document.getElementById('am-username-input').value.trim();
            const password = document.getElementById('am-password-input').value;

            // Basic input validation
            if (!username) { showError('Username cannot be empty.'); return; }
            if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
            if (!password) { showError('Password cannot be empty.'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

            // ── Cookie account check ─────────────────────────────────────────────
            // NOTE: NOT SAFE — example only.
            // Cookie stores "username:password" written at signup.
            const cookies = getCookies();
            const session = cookies['login_session'];

            if (!session) {
                window.location.href = 'signup.html';
                return;
            }

            const [storedUser, storedPass] = session.split(':');

            if (username !== storedUser) {
                showError('That account does not exist here. Only the registered account can log in.');
                return;
            }
            if (password !== storedPass) {
                showError('Incorrect password.');
                return;
            }

            // Credentials match — go to allmarket
            window.location.href = 'allmarket.html';
        }
    </script>
</body>
</html>
