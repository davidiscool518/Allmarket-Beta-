<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllMarket Sign Up</title>
    <link rel="stylesheet" href="skempohic.css">
    <link rel="stylesheet" href="https://unpkg.com/98.css"/>
    <link rel="icon" href="favicon.png">
    <style>
        /* Tiny extra styles that stay consistent with 98.css */
        .signup-note {
            font-size: 0.85em;
            color: #555;
            margin-top: 6px;
        }
        .signup-container form {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <h2>Menu</h2>
            <ul>
                <li><a href="/index.html">Home</a></li>
                <li><a href="/login.html">Login</a></li>
            </ul>
        </div>

        <div class="content">
            <h1 class="am-title">AllMarket</h1>
            <h2>Create an Account</h2>

            <div class="signup-container">
                <!-- Validation error box -->
                <div id="su-error-box" style="display:none; margin-bottom:8px;">
                    <div class="window" style="width:100%; max-width:320px;">
                        <div class="title-bar">
                            <div class="title-bar-text">Error</div>
                        </div>
                        <div class="window-body">
                            <p id="su-error-msg" style="margin:4px 0;"></p>
                        </div>
                    </div>
                </div>

                <!-- Success box -->
                <div id="su-success-box" style="display:none; margin-bottom:8px;">
                    <div class="window" style="width:100%; max-width:320px;">
                        <div class="title-bar" style="background:#000080;">
                            <div class="title-bar-text">Account Created</div>
                        </div>
                        <div class="window-body">
                            <p style="margin:4px 0;">Account created! Redirecting to login…</p>
                        </div>
                    </div>
                </div>

                <form id="su-form" onsubmit="handleSignup(event)">
                    <input id="su-username" type="text"     name="username"  placeholder="Choose a username">
                    <input id="su-email"    type="email"    name="email"     placeholder="Email address">
                    <input id="su-password" type="password" name="password"  placeholder="Choose a password">
                    <input id="su-confirm"  type="password" name="confirm"   placeholder="Confirm password">
                    <button type="submit">Sign Up</button>
                </form>

                <p class="signup-note">Already have an account? <a href="/login.html">Log in</a></p>
            </div>
            <hr>
        </div>
    </div>

    <script>
        // ── 1. COOKIE CHECK ──────────────────────────────────────────────────────
        // If a session already exists, no need to sign up — go home.
        (function checkSessionCookie() {
            const cookies = Object.fromEntries(
                document.cookie.split('; ').filter(Boolean).map(c => c.split('='))
            );
            if (cookies['login_session']) {
                window.location.href = '/allmarket.html';
            }
        })();

        // ── 2. INPUT VALIDATION ──────────────────────────────────────────────────
        function showError(msg) {
            document.getElementById('su-error-msg').textContent = msg;
            document.getElementById('su-error-box').style.display = 'block';
        }

        function clearError() {
            document.getElementById('su-error-box').style.display = 'none';
        }

        function handleSignup(event) {
            event.preventDefault();
            clearError();

            const username = document.getElementById('su-username').value.trim();
            const email    = document.getElementById('su-email').value.trim();
            const password = document.getElementById('su-password').value;
            const confirm  = document.getElementById('su-confirm').value;

            // Validation rules
            if (!username) { showError('Username cannot be empty.'); return; }
            if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }

            if (!email || !email.includes('@')) { showError('Please enter a valid email address.'); return; }

            if (!password) { showError('Password cannot be empty.'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

            if (password !== confirm) { showError('Passwords do not match.'); return; }

            // ── NOTE: NOT SAFE — example only ───────────────────────────────────
            // Set the login_session cookie (expires in 1 day)
            const expires = new Date(Date.now() + 86400 * 1000).toUTCString();
            document.cookie = `login_session=${encodeURIComponent(username)}; expires=${expires}; path=/`;

            // Show success, then redirect to login
            document.getElementById('su-form').style.display = 'none';
            document.getElementById('su-success-box').style.display = 'block';
            setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        }
    </script>
</body>
</html>
